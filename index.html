<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chá de Panela</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffe4ec, #fff);
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

h1 { color: #d63384; }

input {
  padding: 10px;
  width: 80%;
  margin: 10px;
}

li {
  list-style: none;
  padding: 10px;
  margin: 8px;
  background: #f7f7f7;
  cursor: pointer;
  border-radius: 8px;
}

.reservado {
  background: #ddd;
  text-decoration: line-through;
}
</style>
</head>

<body>

<div class="container">

<h1>Chá de Panela João e Amanda</h1>

<input id="nome" placeholder="Seu nome">

<ul id="lista"></ul>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxnc_f5dXE1vGLPs3KfUsaLGRdja2BNduCf-0mbHBJvA8clrhhHEW-ByuslL6FqVCrY0A/exec";

const itens = [
  const itens = [
  // 🍳 COZINHA
  "Panela de pressão",
  "Frigideira",
  "Jogo de panelas",
  "Escorredor de macarrão",
  "Escorredor de louça",
  "Ralador",
  "Espremedor de alho",
  "Espremedor de frutas",
  "Liquidificador",
  "Batedeira",
  "Mixer",
  "Jarra de suco",
  "Conjunto de copos",
  "Xícaras",
  "Jogo de Pratos",
  "Jogo de talheres",
  "Facas de cozinha",
  "Tábua de corte",
  "Conjunto de potes",
  "Potes de plástico",
  "Travessas",
  "Assadeiras",
  "Forma de bolo",
  "Colheres de pau",
  "Concha",
  "Pegador de massa",
  "Saleiro",
  "Açucareiro",

  // 🧹 CASA
  "Vassoura",
  "Rodo",
  "Baldes",
  "Pá de lixo",
  "Lixeira",
  "Panos de prato",
  "Toalha de mesa",
  "Toalhas de rosto",
  "Lençóis",
  "Fronhas",
  "Cobertor",

  // 🏠 UTILIDADES
  "Varal de roupas",
  "Relógio de parede",
  "Organizadores",
  "Tapete de cozinha",
  "Tapete de banheiro"
];
];

let reservas = [];

async function carregar() {
  let res = await fetch(API);
  reservas = await res.json();
  render();
}

function render() {
  let ul = document.getElementById("lista");
  ul.innerHTML = "";

  itens.forEach(item => {

    let ja = reservas.find(r => r.presente === item);

    let li = document.createElement("li");
    li.innerText = item;

    if (ja) {
      li.classList.add("reservado");
      li.innerText += " (reservado)";
    } else {
      li.onclick = () => reservar(item);
    }

    ul.appendChild(li);
  });
}

async function reservar(item) {

  let nome = document.getElementById("nome").value;

  if (!nome) {
    alert("Digite seu nome!");
    return;
  }

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      nome: nome,
      presente: item
    })
  });

  alert("Presente reservado com sucesso 💖");

  carregar();
}

carregar();

</script>

</body>
</html>
