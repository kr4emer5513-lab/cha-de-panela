<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chá de Panela 💖</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffe4ec, #ffffff);
  margin: 0;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 650px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
  color: #c2185b;
}

input {
  padding: 10px;
  width: 80%;
  margin: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

ul {
  padding: 0;
}

li {
  list-style: none;
  padding: 12px;
  margin: 8px;
  background: #f7f7f7;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

li:hover {
  background: #ffe4ec;
}

.reservado {
  background: #ddd;
  text-decoration: line-through;
  cursor: not-allowed;
}
</style>

</head>

<body>

<div class="container">

<h1>Chá de Panela 💖</h1>

<input id="nome" placeholder="Seu nome">
<input id="whats" placeholder="Seu WhatsApp">

<ul id="lista"></ul>

</div>

<script>

// =======================
// 🔥 CONFIGURAÇÃO API
// =======================
const API = "COLE_AQUI_SUA_URL_DO_APPS_SCRIPT";

// =======================
// 🎁 LISTA DE PRESENTES
// =======================
const itens = [
"Frigideira","Jogo de panelas", "Escorredor de macarrão","Escorredor de louça","Ralador","Espremedor de alho", "Espremedor de frutas","Liquidificador","Batedeira","Mixer","Jarra de suco", "Conjunto de copos","Xícaras","Jogo de Pratos", "Jogo de talheres","Facas de cozinha","Tábua de corte","Conjunto de potes","Travessas","Assadeiras","Forma de bolo","Colheres de pau", "Concha","Pegador de massa","Saleiro","Açucareiro","Vassoura","Rodo", "Baldes","Pá de lixo","Lixeira","Panos de prato","Toalha de mesa", "Toalhas de rosto","Lençóis","Fronhas","Cobertor", "Varal de roupas","Relógio de parede","Organizadores", "Tapete de cozinha","Tapete de banheiro"
];

// =======================
// 📦 RESERVAS
// =======================
let reservas = [];

// =======================
// 📥 CARREGAR DADOS
// =======================
async function carregar() {
  try {
    let res = await fetch(API);
    let text = await res.text();

    try {
      reservas = JSON.parse(text);
    } catch {
      reservas = [];
    }

  } catch {
    reservas = [];
  }

  render();
}

// =======================
// 🖥️ RENDER LISTA
// =======================
function render() {
  let ul = document.getElementById("lista");

  if (!ul) return;

  ul.innerHTML = "";

  itens.forEach(item => {

    let ja = reservas.find(r => r.presente === item);

    let li = document.createElement("li");
    li.innerText = item;

    if (ja) {
      li.classList.add("reservado");
      li.innerText += " (reservado)";
    } else {
      li.onclick = () => reservar(item);
    }

    ul.appendChild(li);
  });
}

// =======================
// 🎁 RESERVAR ITEM
// =======================
async function reservar(item) {

  let nome = document.getElementById("nome").value.trim();
  let whats = document.getElementById("whats").value.trim();

  if (!nome || !whats) {
    alert("Preencha nome e WhatsApp 💖");
    return;
  }

  // evita duplicação
  if (reservas.find(r => r.presente === item)) {
    alert("Esse presente já foi escolhido 💔");
    return;
  }

  try {
    await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        nome,
        presente: item,
        whatsapp: whats
      })
    });
  } catch {
    alert("Erro ao salvar reserva");
    return;
  }

  // WhatsApp automático
  let msg = `Olá! Sou ${nome} e vou levar o presente: ${item}`;
  let url = `https://wa.me/55${whats}?text=${encodeURIComponent(msg)}`;

  window.open(url, "_blank");

  carregar();
}

// =======================
// 🚀 INICIAR
// =======================
carregar();

</script>

</body>
</html>
