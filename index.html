<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chá de Panela João e Amanda</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #ffe4ec, #fff);
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  color: #c2185b;
  font-size: 32px;
  margin-bottom: 10px;
}

input {
  padding: 12px;
  width: 85%;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #c2185b;
  box-shadow: 0 0 8px rgba(194,24,91,0.2);
}

ul {
  padding: 0;
  margin-top: 20px;
}

li {
  list-style: none;
  padding: 14px;
  margin: 10px;
  background: #fafafa;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.25s;
  border: 1px solid #eee;
}

li:hover {
  background: #ffe4ec;
  transform: scale(1.02);
  border-color: #f8bbd0;
}

.reservado {
  background: #e0e0e0 !important;
  color: #777;
  text-decoration: line-through;
  cursor: not-allowed;
  transform: none !important;
}

footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>Chá de Panela João e Amanda</h1>

<input id="nome" placeholder="Seu nome">

<ul id="lista"></ul>

</div>

<script>

// =======================
// 🔥 CONFIGURAÇÃO API
// =======================
const API = "https://script.google.com/macros/s/AKfycbwnR2nI1MAEmIXnsN3uFeYGrO5pSam_d23W6Tjs-GsV29_sTdWHxIxAJLQyogiRH3CjUQ/exec";

// =======================
// 🎁 LISTA DE PRESENTES
// =======================
const itens = [
"Frigideira","Jogo de panelas", "Escorredor de macarrão","Escorredor de louça","Ralador","Espremedor de alho", "Espremedor de frutas","Liquidificador","Batedeira","Mixer","Jarra de suco", "Conjunto de copos","Xícaras","Jogo de Pratos", "Jogo de talheres","Facas de cozinha","Tábua de corte","Conjunto de potes","Travessas","Assadeiras","Forma de bolo","Colheres de pau", "Concha","Pegador de massa","Saleiro","Açucareiro","Vassoura","Rodo", "Baldes","Pá de lixo","Lixeira","Panos de prato","Toalha de mesa", "Toalhas de rosto","Lençóis","Fronhas","Cobertor", "Varal de roupas","Relógio de parede","Organizadores", "Tapete de cozinha","Tapete de banheiro","Soulsplat","Forma de Gelo","Peneira","Cabides","Plantas Artificais","Porta Sabonete Liquido","Panos de Chão","Prendedores","Extensão","Porta-Chaves"
];

// =======================
// 📦 RESERVAS
// =======================
let reservas = [];

// =======================
// 📥 CARREGAR DADOS
// =======================
async function carregar() {
  try {
    let res = await fetch(API);
    let text = await res.text();

    try {
      reservas = JSON.parse(text);
    } catch {
      reservas = [];
    }

  } catch {
    reservas = [];
  }

  render();
}

// =======================
// 🖥️ RENDER LISTA
// =======================
function render() {
  let ul = document.getElementById("lista");

  if (!ul) return;

  ul.innerHTML = "";

  itens.forEach(item => {

    let ja = reservas.find(r => r.presente === item);

    let li = document.createElement("li");
    li.innerText = item;

    if (ja) {
      li.classList.add("reservado");
      li.innerText += " (reservado)";
    } else {
      li.onclick = () => reservar(item);
    }

    ul.appendChild(li);
  });
}

// =======================
// 🎁 RESERVAR ITEM
// =======================
async function reservar(item) {

  let nome = document.getElementById("nome").value.trim();

  if (!nome) {
    alert("Digite seu nome 💖");
    return;
  }

  // evita duplicação
  if (reservas.find(r => r.presente === item)) {
    alert("Esse presente já foi escolhido 💔");
    return;
  }

  try {
    await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        nome,
        presente: item
      })
    });
  } catch {
    alert("Erro ao salvar");
    return;
  }

  // 💖 WHATSAPP FIXO (SEU NÚMERO SÓ)
  let numeroDestino = "5554996702581";

  let mensagem = ` Chá de Panela
Olá! Sou ${nome}
Vou levar o presente: ${item}`;

  let url = `https://wa.me/${numeroDestino}?text=${encodeURIComponent(mensagem)}`;

  window.open(url, "_blank");

  carregar();
}
// =======================
// 🚀 INICIAR
// =======================
carregar();

</script>

</body>
</html>
