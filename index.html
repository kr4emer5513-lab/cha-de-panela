<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chá de Panela</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffe4ec, #fff);
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

h1 { color: #d63384; }

input {
  padding: 10px;
  width: 80%;
  margin: 10px;
}

li {
  list-style: none;
  padding: 10px;
  margin: 8px;
  background: #f7f7f7;
  cursor: pointer;
  border-radius: 8px;
}

.reservado {
  background: #ddd;
  text-decoration: line-through;
}
</style>
</head>

<body>

<div class="container">

<h1>Chá de Panela João e Amanda</h1>

<input id="nome" placeholder="Seu nome">

<ul id="lista"></ul>

</div>

<script>

<script>

const API = "https://script.google.com/macros/s/AKfycbzeKDnx1a1xx-jrztRCjUCBgYTHT7dZSxxm_iPSiqoYflle91_2La0YX4CwA944xpuLfA/exec";

// SUA LISTA (mantém a sua)
const itens = [
  "Panela média","Panela grande","Panela de pressão","Frigideira","Jogo de panelas",
  "Escorredor de macarrão","Escorredor de louça","Ralador","Espremedor de alho",
  "Espremedor de frutas","Liquidificador","Batedeira","Mixer","Jarra de suco",
  "Conjunto de copos","Xícaras","Canecas","Pratos fundos","Pratos rasos",
  "Jogo de talheres","Facas de cozinha","Tábua de corte","Conjunto de potes",
  "Potes de plástico","Travessas","Assadeiras","Forma de bolo","Colheres de pau",
  "Concha","Pegador de massa","Saleiro","Açucareiro","Vassoura","Rodo",
  "Baldes","Pá de lixo","Lixeira","Panos de prato","Toalha de mesa",
  "Toalhas de rosto","Toalhas de banho","Lençóis","Fronhas","Cobertor",
  "Varal de roupas","Relógio de parede","Organizadores","Cesto de roupa suja",
  "Tapete de cozinha","Tapete de banheiro"
];

// cache local (🔥 parte importante)
let reservas = JSON.parse(localStorage.getItem("reservas") || "[]");

// salva cache
function salvarCache() {
  localStorage.setItem("reservas", JSON.stringify(reservas));
}

// carrega API com segurança total
async function carregar() {
  try {
    let res = await fetch(API);
    let text = await res.text();

    let data = [];

    try {
      data = JSON.parse(text);
    } catch (e) {
      console.log("API não retornou JSON válido");
      data = [];
    }

    reservas = data;
    salvarCache();

  } catch (e) {
    console.log("Falha API, usando cache local");
  }

  render();
}

// render seguro
function render() {
  let ul = document.getElementById("lista");
  if (!ul) return;

  ul.innerHTML = "";

  itens.forEach(item => {

    let ja = reservas.find(r => r.presente === item);

    let li = document.createElement("li");
    li.innerText = item;

    if (ja) {
      li.classList.add("reservado");
      li.innerText += " (reservado)";
    } else {
      li.onclick = () => reservar(item);
    }

    ul.appendChild(li);
  });
}

// reserva blindada
async function reservar(item) {

  let nome = document.getElementById("nome").value.trim();

  if (!nome) {
    alert("Digite seu nome 💖");
    return;
  }

  // evita duplicação local imediata
  if (reservas.find(r => r.presente === item)) {
    alert("Esse presente já foi escolhido 💔");
    return;
  }

  try {
    await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        nome,
        presente: item
      })
    });
  } catch (e) {
    alert("Erro ao salvar, tente novamente");
    return;
  }

  // atualiza cache local instantâneo
  reservas.push({ nome, presente: item });
  salvarCache();

  // WhatsApp (igual você queria)
  let mensagem = `Olá! Sou ${nome} e vou levar o presente: ${item}`;
  let numero = "55SEUNUMEROAQUI";

  let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
  window.open(url, "_blank");

  render();
}

carregar();

</script>

</body>
</html>
